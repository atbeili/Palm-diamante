<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Palm Diamante - Ficha de Cliente</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy:#1B2A4A; --navy2:#243860; --gold:#C8963E; --gold-lt:#FFF8E7; --gold-bd:#F0C040;
  --green:#1D7A34; --green-lt:#EAF4EA; --red:#C0392B; --purple:#7D3C98; --purple-lt:#F5EEF8;
  --amber:#7D6608; --blue:#1A5276; --gray-lt:#F7F7F7; --gray-bd:#E0E0E0; --text:#1A1A1A; --muted:#888;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#EEF2F7;color:var(--text);}
.topbar{background:var(--navy);color:#fff;padding:14px 20px;}
.topbar h1{font-size:18px;font-weight:700;}
.topbar p{font-size:11px;color:#99b3dd;margin-top:2px;}
.wrap{max-width:900px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:14px;overflow:hidden;}
.card-head{padding:10px 16px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase;}
.card-body{padding:14px 16px;}

/* Update bar */
.update-bar{background:var(--green);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.update-bar p{font-size:12px;opacity:.85;margin:0;}
.update-bar strong{font-size:13px;}
.upload-label{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--green);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.upload-label:hover{background:#f0fff4;}
#fileInput{display:none;}

/* Search */
.suggestions{position:relative;}
.search-wrap{display:flex;gap:8px;align-items:center;}
input[type=text],select{width:100%;padding:10px 14px;font-size:14px;font-weight:600;border:2px solid var(--gold-bd);border-radius:8px;background:var(--gold-lt);outline:none;color:var(--navy);font-family:inherit;}
input[type=text]:focus,select:focus{border-color:var(--gold);}
.btn{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;}
.btn-clear{background:#E5E7EB;color:#555;}
.btn-clear:hover{background:#D1D5DB;}
.sugg-list{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:2px solid var(--gold);border-radius:12px;max-height:360px;overflow-y:auto;z-index:1000;box-shadow:0 16px 40px rgba(0,0,0,.2);display:none;}
.sugg-item{padding:14px 18px;font-size:13px;cursor:pointer;border-bottom:1px solid #F0F0F0;line-height:1.4;}
.sugg-item:hover{background:var(--gold-lt);font-weight:600;color:var(--navy);}
.sugg-item:first-child{border-radius:10px 10px 0 0;}
.sugg-item:last-child{border-bottom:none;border-radius:0 0 10px 10px;}
.sugg-count{padding:6px 18px;font-size:11px;color:var(--muted);background:#fafafa;border-top:1px solid #F0F0F0;border-radius:0 0 10px 10px;}

/* Depto */
.depto-row{display:none;margin-top:10px;align-items:center;gap:10px;}
.depto-row.show{display:flex;}
.depto-lbl{font-size:12px;font-weight:700;color:var(--navy);white-space:nowrap;}
.depto-badge{background:var(--purple-lt);color:var(--purple);font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;white-space:nowrap;}

/* Fields */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid1{display:grid;gap:8px;}
.f{display:flex;flex-direction:column;gap:3px;}
.f-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.f-val{font-size:13px;padding:7px 10px;background:var(--gray-lt);border:1px solid var(--gray-bd);border-radius:6px;min-height:34px;word-break:break-word;}
.f-val.money{color:var(--navy);font-weight:700;}
.f-val.red{color:var(--red);font-weight:700;}
.f-val.green{color:var(--green);font-weight:700;}
.f-val.dim{color:var(--muted);font-style:italic;}

/* Simulator */
.sim-row{display:grid;grid-template-columns:1fr 32px 1fr;gap:6px;align-items:end;margin-bottom:8px;}
.sim-arrow{text-align:center;font-size:14px;color:var(--muted);padding-bottom:8px;}
.sim-group{display:flex;flex-direction:column;gap:4px;}
.sim-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
input.sim-inp{width:100%;padding:9px 12px;font-size:13px;font-weight:700;color:#0000CC;background:var(--gold-lt);border:2px solid var(--gold-bd);border-radius:8px;text-align:right;font-family:inherit;}
input.sim-inp:focus{border-color:var(--gold);outline:none;}
.sim-hint{font-size:10px;color:var(--muted);font-style:italic;}
.divider{height:1px;background:var(--gray-bd);margin:12px 0;}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.res-item{background:var(--green-lt);border:1px solid #C8E6C9;border-radius:8px;padding:10px 12px;}
.res-item.wide{grid-column:1/-1;}
.res-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.res-val{font-size:16px;font-weight:700;color:var(--green);}
.res-val.red{color:var(--red);}
.res-val.purple{color:var(--purple);}
.res-val.navy{color:var(--navy);}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-ok{background:#DCFCE7;color:#166534;}
.badge-warn{background:#FEF3C7;color:#92400E;}
.badge-info{background:var(--purple-lt);color:var(--purple);}

/* PDF buttons */
.pdf-btns{display:none;position:fixed;bottom:24px;right:24px;flex-direction:column;gap:10px;z-index:999;}
.pdf-btns.visible{display:flex;}
.print-btn{display:flex;align-items:center;gap:8px;border:none;border-radius:50px;padding:13px 22px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .1s;}
.print-btn:hover{transform:translateY(-1px);}
.print-btn.empresa{background:var(--navy);color:#fff;}
.print-btn.cliente{background:var(--green);color:#fff;}

/* Toast */
.toast{position:fixed;top:16px;right:16px;background:var(--green);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;display:none;}
.toast.error{background:var(--red);}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-style:italic;font-size:14px;}

@media(max-width:580px){
  .grid2,.res-grid,.sim-row{grid-template-columns:1fr;}
  .sim-arrow{display:none;}
  .res-item.wide{grid-column:1;}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>PALM DIAMANTE &mdash; FICHA DE CLIENTE</h1>
  <p>Cobranza Mayo 2026 &nbsp;|&nbsp; Consulta y simulacion de descuento</p>
</div>

<div class="update-bar" id="updateBar">
  <div>
    <strong id="updateTitle">Conectando con Google Sheets...</strong>
    <p id="dataSourceLabel">Cargando datos actualizados...</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <button class="upload-label" onclick="loadFromScript()" style="background:rgba(255,255,255,.9);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Actualizar
    </button>
    <label class="upload-label" for="fileInput">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Cargar Excel
    </label>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="loadExcelFile(event)">
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="pdf-btns" id="pdfBtns">
  <button class="print-btn empresa" onclick="downloadPDF('empresa')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Descargar Empresa
  </button>
  <button class="print-btn cliente" onclick="downloadPDF('cliente')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Descargar Cliente
  </button>
</div>

<div class="wrap">

  <div class="card">
    <div class="card-head" style="background:var(--navy)">Buscar cliente</div>
    <div class="card-body">
      <div class="suggestions">
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="Escribe o pega el nombre del cliente..." autocomplete="off" spellcheck="false">
          <button class="btn btn-clear" onclick="clearAll()">Limpiar</button>
        </div>
        <div id="suggList" class="sugg-list"></div>
      </div>
      <div class="depto-row" id="deptoRow">
        <span class="depto-lbl">Torre / Depto:</span>
        <select id="deptoSel" onchange="onDeptoChange()">
          <option value="">-- Selecciona un departamento --</option>
        </select>
        <span class="depto-badge" id="deptoBadge"></span>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="card"><div class="card-body"><div class="empty-state">Escribe el nombre del cliente para ver su informacion</div></div></div>
  </div>

</div>

const $ = id => document.getElementById(id);
const fmtM = n => !n && n!==0 ? '--' : '$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtP = n => !n && n!==0 ? '--' : (Number(n)*100).toFixed(2)+'%';

let curClient=null, curData=null, inp=null;

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyMyb5sr7HENEnm4MYBf56stMJGv8Fw1M4fd9BJYZi5DNmfo_IEGfR4wRBXn_usQK75fQ/exec';

document.addEventListener('DOMContentLoaded', () => {
  inp = $('searchInput');
  if (inp) {
    inp.addEventListener('input', onInput);
    inp.addEventListener('paste', () => setTimeout(onInput, 30));
    inp.addEventListener('keydown', e => { if(e.key==='Escape') hideSugg(); });
  }
  document.addEventListener('click', e => { if(!e.target.closest('.suggestions')) hideSugg(); });
  loadFromScript();
});

function onInput() {
  if (!inp) return;
  const q = inp.value.trim().toUpperCase();
  if (!q) { hideSugg(); return; }
  const keys = Object.keys(DB);
  const exact = keys.find(k => k.toUpperCase() === q);
  if (exact) { hideSugg(); loadClient(exact); return; }
  const matches = keys.filter(k => k.toUpperCase().includes(q));
  showSugg(matches.slice(0, 15), matches.length);
}

function showSugg(matches, total) {
  const list = $('suggList');
  if (matches.length === 0) {
    list.innerHTML = '<div class="sugg-item" style="color:var(--muted);font-style:italic">No se encontro ningun cliente</div>';
  } else {
    const items = matches.map(m => `<div class="sugg-item" onclick="pickSugg('${m.replace(/'/g,"\'")}')">${m}</div>`).join('');
    const counter = total > matches.length ? `<div class="sugg-count">Mostrando ${matches.length} de ${total} &mdash; escribe mas para filtrar</div>` : '';
    list.innerHTML = items + counter;
  }
  list.style.display = 'block';
}

function hideSugg() { $('suggList').style.display = 'none'; }
function pickSugg(name) { inp.value = name; hideSugg(); loadClient(name); }

function loadClient(name) {
  curClient = name;
  const entries = DB[name];
  const dr = $('deptoRow'), ds = $('deptoSel'), db = $('deptoBadge');
  if (entries.length > 1) {
    dr.classList.add('show');
    ds.innerHTML = '<option value="">-- Selecciona un departamento --</option>' +
      entries.map((e,i) => `<option value="${i}">Torre ${e.torre} - Depto ${e.depto}</option>`).join('');
    db.textContent = entries.length + ' deptos';
    ds.value = ''; curData = null; renderWaiting();
  } else {
    dr.classList.remove('show');
    curData = entries[0]; renderFicha(curData);
  }
}

function onDeptoChange() {
  const v = $('deptoSel').value;
  if (!v) { curData=null; renderWaiting(); return; }
  curData = DB[curClient][parseInt(v)]; renderFicha(curData);
}

function clearAll() {
  if(inp) inp.value='';
  hideSugg(); curClient=null; curData=null;
  $('deptoRow').classList.remove('show');
  $('pdfBtns').classList.remove('visible');
  $('content').innerHTML='<div class="card"><div class="card-body"><div class="empty-state">Escribe el nombre del cliente para ver su informacion</div></div></div>';
}

function fi(label, val, cls='') {
  return `<div class="f"><div class="f-lbl">${label}</div><div class="f-val ${cls}">${val||'<span style="color:var(--muted);font-style:italic">--</span>'}</div></div>`;
}

function renderWaiting() {
  $('pdfBtns').classList.remove('visible');
  $('content').innerHTML = `
    <div class="card">
      <div class="card-head" style="background:var(--purple)">Selecciona un departamento</div>
      <div class="card-body"><p style="color:var(--purple);font-weight:700;padding:8px 0">Elige un departamento del selector de arriba</p></div>
    </div>${simCard(null)}`;
}

  $('content').innerHTML = `
    <div class="card">
      <div class="card-head" style="background:var(--blue)">Identificacion del cliente</div>

        ${fi('Nivel',d.nivel)} ${fi('Estatus',d.estatus)}
        ${fi('Telefono',d.tel)} ${fi('Antiguedad (tiempo vencido)',d.ant)}
        ${fi('Vendedor',d.vendedor)} ${fi('Fecha venta',d.fecha)}
      </div></div>
    </div>
    <div class="card">

        ${fi('Depositos',fmtM(d.depositos),'money')} ${fi('Efectivo',fmtM(d.efectivo),'money')}
        ${fi('Dep + Efectivo',fmtM(d.dep_ef),'money')} ${fi('% Enganche',fmtP(d.enganche))}

    </div>

      <div class="card-head" style="background:var(--green)">Descuento maximo autorizado</div>
      <div class="card-body"><div class="grid2">
        ${fi('Desc. max %', d.desc_pct>0?(d.desc_pct*100).toFixed(2)+'%':'No aplica (Torres 1)', d.desc_pct>0?'green':'dim')}
        ${fi('Desc. max $', d.desc_monto>0?fmtM(d.desc_monto):'No aplica (Torres 1)', d.desc_monto>0?'green':'dim')}
      </div></div>
    </div>
    ${simCard(d)}
    <div class="card">
      <div class="card-head" style="background:var(--red)">Acuerdo</div>
      <div class="card-body"><div class="f-val">${d.acuerdo||'--'}</div></div>
    </div>`;
  attachSim(d);
}

function simCard(d) {
  return `<div class="card">
    <div class="card-head" style="background:var(--purple)">Simulador de descuento (edita los campos amarillos)</div>
    <div class="card-body">
      <div class="sim-row">
        <div class="sim-group"><div class="sim-lbl">Monto a adelantar $</div>
          <input type="number" class="sim-inp" id="s_montoD" placeholder="0.00" min="0" step="0.01">
          <div class="sim-hint">Monto en pesos</div></div>
        <div class="sim-arrow">&harr;</div>
        <div class="sim-group"><div class="sim-lbl">Monto a adelantar %</div>
          <input type="number" class="sim-inp" id="s_montoPct" placeholder="0.00" min="0" max="100" step="0.01">
          <div class="sim-hint">Ej: 50 = 50% del saldo</div></div>
      </div>
      <div class="sim-row">
        <div class="sim-group"><div class="sim-lbl">Descuento a dar $</div>
          <input type="number" class="sim-inp" id="s_descD" placeholder="0.00" min="0" step="0.01">
          <div class="sim-hint">Descuento en pesos</div></div>
        <div class="sim-arrow">&harr;</div>
        <div class="sim-group"><div class="sim-lbl">Descuento a dar %</div>
          <input type="number" class="sim-inp" id="s_descPct" placeholder="0.00" min="0" step="0.01">
          <div class="sim-hint">Ej: 1.5 = 1.5% del monto</div></div>
      </div>
      <div class="divider"></div>
      <div class="res-grid">
        <div class="res-item"><div class="res-lbl">Monto adelantado $</div><div class="res-val navy" id="r_montoD">--</div></div>
        <div class="res-item"><div class="res-lbl">Monto adelantado % del saldo</div><div class="res-val navy" id="r_montoPct">--</div></div>
        <div class="res-item wide"><div class="res-lbl">Pago adelantado sin descuento</div><div class="res-val navy" id="r_pago_sin">--</div></div>
        <div class="res-item"><div class="res-lbl">Descuento %</div><div class="res-val purple" id="r_descPct">--</div></div>
        <div class="res-item"><div class="res-lbl">Descuento $</div><div class="res-val purple" id="r_descD">--</div></div>
        <div class="res-item wide"><div class="res-lbl">Saldo restante (despues del descuento)</div><div class="res-val red" id="r_saldo">--</div></div>
        <div class="res-item wide" id="r_badge" style="display:none"></div>
      </div>
    </div>
  </div>`;
}

function attachSim(d) {
  const saldo = parseFloat(d.saldo)||0;
  const descMax = parseFloat(d.desc_monto)||0;
  let updating = false;

  function calc(source) {
    if (updating) return;
    updating = true;
    const mD   = parseFloat($('s_montoD').value)||0;
    const mPct = parseFloat($('s_montoPct').value)||0;
    const dD   = parseFloat($('s_descD').value)||0;
    const dPct = parseFloat($('s_descPct').value)||0;

    let monto = 0;
    if (source==='s_montoD' && mD>0) {
      monto=mD;
      $('s_montoPct').value = saldo>0 ? (mD/saldo*100).toFixed(2) : '';
    } else if (source==='s_montoPct' && mPct>0) {
      monto=mPct/100*saldo;
      $('s_montoD').value = monto.toFixed(2);
    } else if (mD>0) { monto=mD; }
    else if (mPct>0) { monto=mPct/100*saldo; }

    let desc = 0;
    if (source==='s_descD' && dD>0) {
      desc=dD;
      $('s_descPct').value = monto>0 ? (dD/monto*100).toFixed(2) : '';
    } else if (source==='s_descPct' && dPct>0) {
      desc=dPct/100*monto;
      $('s_descD').value = desc.toFixed(2);
    } else if (dD>0) { desc=dD; }
    else if (dPct>0) { desc=dPct/100*monto; }

    updating = false;

    if (monto===0) {
      ['r_montoD','r_montoPct','r_pago_sin','r_descPct','r_descD','r_saldo'].forEach(id=>{const e=$(id);if(e)e.textContent='--';});
      const b=$('r_badge'); if(b) b.style.display='none';
      return;
    }
    const resto = Math.max(saldo-monto, 0);
    const pctM  = saldo>0 ? monto/saldo*100 : 0;
    const pctD  = monto>0 ? desc/monto*100  : 0;

    $('r_montoD').textContent   = fmtM(monto);
    $('r_montoPct').textContent = pctM.toFixed(2)+'%';
    $('r_pago_sin').textContent = fmtM(monto);
    $('r_descPct').textContent  = pctD.toFixed(2)+'%';
    $('r_descD').textContent    = fmtM(desc);
    $('r_saldo').textContent    = fmtM(resto);

    const b=$('r_badge');
    if (desc>0) {
      b.style.display='block';
      if (descMax>0) {
        b.innerHTML = desc>descMax
          ? '<span class="badge badge-warn">Excede el descuento maximo autorizado de '+fmtM(descMax)+'</span>'
          : '<span class="badge badge-ok">Dentro del limite autorizado &mdash; max '+fmtM(descMax)+'</span>';
      } else {
        b.innerHTML = '<span class="badge badge-info">Cliente de Torres 1 &mdash; sin limite de descuento definido</span>';
      }
    } else { b.style.display='none'; }
  }

  ['s_montoD','s_montoPct','s_descD','s_descPct'].forEach(id => {
    const el=$(id); if(!el) return;
    el.addEventListener('input', ()=>calc(id));
  });
}

function loadFromScript() {
  const bar   = $('updateBar');
  const title = $('updateTitle');
  const label = $('dataSourceLabel');

  // Show local data immediately
  const localCount = Object.keys(DB).length;
  if (bar)   bar.style.background = '#1D7A34';
  if (title) title.textContent = 'Datos locales (' + localCount + ' clientes)';
  if (label) label.innerHTML = localCount + ' clientes listos &mdash; sincronizando con Drive...';

  // Use JSONP to bypass CORS
  const callbackName = 'palmCallback_' + Date.now();
  const script = document.createElement('script');
  
  const timeout = setTimeout(() => {
    cleanup();
    if (title) title.textContent = 'Datos locales (' + Object.keys(DB).length + ' clientes)';
    if (label) label.innerHTML = Object.keys(DB).length + ' clientes &mdash; Drive no disponible';
  }, 10000);

  function cleanup() {
    clearTimeout(timeout);
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[callbackName] = function(raw) {
    cleanup();
    try {
      const toN = v => { if (!v) return 0; const n = parseFloat(String(v).replace(/[$%,\s]/g,'')); return isNaN(n) ? 0 : Math.round(n*100)/100; };
      const toS = v => (v || '').toString().trim();

      // Find header row
      let hi = -1;
      for (let i = 0; i < Math.min(raw.length, 10); i++) {
        if (raw[i][4] && String(raw[i][4]).toLowerCase().includes('cliente')) { hi = i; break; }
      }
      if (hi === -1) hi = 4;

      const newClients = {};
      for (let i = hi + 1; i < raw.length; i++) {
        const r = raw[i]; if (!r || r.length < 5) continue;
        const name = toS(r[4]); if (!name || name.length < 3) continue;
        if (['cliente','total','subtotal','totales'].some(x => name.toLowerCase() === x)) continue;
        const e = {
          torre:toS(r[1]), nivel:toS(r[2]), depto:toS(r[3]), tel:toS(r[5]),
          estatus:toS(r[6]), vendedor:toS(r[7]), fecha:toS(r[8]).slice(0,10),
          precio:toN(r[9]), precio_m2:toN(r[10]), depositos:toN(r[11]),
          efectivo:toN(r[12]), dep_ef:toN(r[13]), enganche:toN(r[14]),
          doc:toN(r[15]), pago_final:toN(r[16]), saldo:toN(r[17]),
          vencido:toN(r[18]), venc_desde:toS(r[19]), ant:toS(r[20]),
          nota:toS(r[21]), desc_pct:toN(r[22]), desc_monto:toN(r[23]), acuerdo:toS(r[24])
        };
        if (!newClients[name]) newClients[name] = [];
        newClients[name].push(e);
      }

      const count = Object.keys(newClients).length;
      if (count === 0) throw new Error('Sin clientes');
      Object.keys(DB).forEach(k => delete DB[k]);
      Object.assign(DB, newClients);
      clearAll();
      if (bar)   bar.style.background = '#1D7A34';
      if (title) title.textContent = 'Sincronizado con Google Sheets';
      if (label) label.innerHTML = count + ' clientes actualizados automaticamente';
    } catch(err) {
      console.warn('JSONP parse error:', err.message);
      if (title) title.textContent = 'Datos locales (' + Object.keys(DB).length + ' clientes)';
      if (label) label.innerHTML = Object.keys(DB).length + ' clientes cargados';
    }
  };

  script.onerror = function() {
    cleanup();
    if (title) title.textContent = 'Datos locales (' + Object.keys(DB).length + ' clientes)';
    if (label) label.innerHTML = Object.keys(DB).length + ' clientes &mdash; Drive no disponible';
  };

  script.src = SCRIPT_URL + '?callback=' + callbackName;
  document.head.appendChild(script);
}


function showToast(msg, isError) {
  const t=$('toast'); t.textContent=msg;
  t.className='toast'+(isError?' error':'');
  t.style.display='block';
  setTimeout(()=>{ t.style.display='none'; }, 4000);
}

function loadExcelFile(event) {
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e) {
    try {
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      let sheetName=wb.SheetNames.find(s=>s.includes('Cobranza')||s.includes('cobranza'));
      if(!sheetName) sheetName=wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      let hi=-1;
      for(let i=0;i<Math.min(rows.length,10);i++){
        if(rows[i]&&String(rows[i][4]||'').toLowerCase().includes('cliente')){hi=i;break;}
      }
      if(hi===-1) hi=4;
      const toN=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[$%,\s]/g,''));return isNaN(n)?0:Math.round(n*100)/100;};
      const toS=v=>v===null||v===undefined?'':String(v).trim();
      const newDB={};
      for(let i=hi+1;i<rows.length;i++){
        const r=rows[i]; if(!r) continue;
        const name=toS(r[4]); if(!name||name.length<3) continue;
        if(['cliente','total','subtotal','totales'].includes(name.toLowerCase())) continue;
        const e={torre:toS(r[1]),nivel:toS(r[2]),depto:toS(r[3]),tel:toS(r[5]),estatus:toS(r[6]),
          vendedor:toS(r[7]),fecha:toS(r[8]).slice(0,10),precio:toN(r[9]),precio_m2:toN(r[10]),
          depositos:toN(r[11]),efectivo:toN(r[12]),dep_ef:toN(r[13]),enganche:toN(r[14]),
          doc:toN(r[15]),pago_final:toN(r[16]),saldo:toN(r[17]),vencido:toN(r[18]),
          venc_desde:toS(r[19]),ant:toS(r[20]),nota:toS(r[21]),
          desc_pct:toN(r[22]),desc_monto:toN(r[23]),acuerdo:toS(r[24])};
        if(!newDB[name]) newDB[name]=[];
        newDB[name].push(e);
      }
      const count=Object.keys(newDB).length;
      if(count===0){showToast('No se encontraron clientes',true);return;}
      Object.keys(DB).forEach(k=>delete DB[k]);
      Object.assign(DB,newDB);
      $('dataSourceLabel').textContent=count+' clientes cargados desde '+file.name;
      clearAll();
      showToast('Actualizado: '+count+' clientes cargados');
    } catch(err){showToast('Error: '+err.message,true);}
    event.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

async function downloadPDF(mode) {
  const d=curData; if(!d) return;
  const {jsPDF}=window.jspdf;
  const now=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pageW=210, margin=12, colW=(pageW-margin*2-4)/2;
  let y=margin;

  const navy=[27,42,74],gold=[200,150,62],green=[29,122,52],red=[192,57,43];
  const purple=[125,60,152],amber=[125,102,8],blue=[26,82,118];
  const gray=[247,247,247],border=[220,220,220],white=[255,255,255],dark=[26,26,26],muted=[136,136,136];

  pdf.setFont('helvetica');
  pdf.setFillColor(...navy); pdf.rect(0,0,pageW,22,'F');
  pdf.setTextColor(...white); pdf.setFontSize(14); pdf.setFont('helvetica','bold');
  pdf.text('PALM DIAMANTE  -  FICHA DE CLIENTE', margin, 10);
  pdf.setFontSize(8); pdf.setFont('helvetica','normal');
  pdf.setTextColor(170,195,230);
  pdf.text(now+'  |  '+curClient, margin, 17);
  y=28;

  function secHdr(label,color){
    pdf.setFillColor(...color); pdf.rect(margin,y,pageW-margin*2,7,'F');
    pdf.setTextColor(...white); pdf.setFontSize(8); pdf.setFont('helvetica','bold');
    pdf.text(label.toUpperCase(),margin+3,y+5); y+=9;
  }
  function field(label,value,x,fw,hl){
    pdf.setFillColor(...gray); pdf.rect(x,y,fw,9,'F');
    pdf.setDrawColor(...border); pdf.rect(x,y,fw,9,'S');
    pdf.setTextColor(...muted); pdf.setFontSize(7); pdf.setFont('helvetica','bold');
    pdf.text(label.toUpperCase(),x+2,y+3.5);
    pdf.setTextColor(...(hl||dark)); pdf.setFontSize(9); pdf.setFont('helvetica',hl?'bold':'normal');
    pdf.text(String(value||'--').slice(0,38),x+2,y+7.5);
  }
  function row2(l1,v1,l2,v2,h1,h2){field(l1,v1,margin,colW,h1);field(l2,v2,margin+colW+4,colW,h2);y+=11;}
  function row1(label,value,hl){
    pdf.setFillColor(...gray); pdf.rect(margin,y,pageW-margin*2,9,'F');
    pdf.setDrawColor(...border); pdf.rect(margin,y,pageW-margin*2,9,'S');
    pdf.setTextColor(...muted); pdf.setFontSize(7); pdf.setFont('helvetica','bold');
    pdf.text(label.toUpperCase(),margin+2,y+3.5);
    pdf.setTextColor(...(hl||dark)); pdf.setFontSize(9); pdf.setFont('helvetica',hl?'bold':'normal');
    pdf.text(String(value||'--').slice(0,80),margin+2,y+7.5); y+=11;
  }

  const fM=n=>'$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
  const fP=n=>(Number(n||0)*100).toFixed(2)+'%';

  secHdr('Identificacion del Cliente',blue);
  row2('Torre',d.torre,'Depto',d.depto);
  row2('Nivel',d.nivel,'Estatus',d.estatus);
  row2('Telefono',d.tel,'Antiguedad (tiempo vencido)',d.ant);
  row2('Vendedor',d.vendedor,'Fecha venta',d.fecha);
  y+=2;

  secHdr('Datos Financieros',amber);
  row2('Precio venta',fM(d.precio),'Precio m2',fM(d.precio_m2),navy,navy);
  row2('Depositos',fM(d.depositos),'Efectivo',fM(d.efectivo));
  row2('Dep+Efectivo',fM(d.dep_ef),'% Enganche',fP(d.enganche));
  row2('Documentado',fM(d.doc),'Pago final',fM(d.pago_final));
  row2('Saldo que debe',fM(d.saldo),'Vencido',fM(d.vencido),red,d.vencido>0?red:null);
  row1('Vencido desde',d.venc_desde);
  y+=2;

  if (mode==='empresa') {
    secHdr('Descuento Maximo Autorizado',green);
    row2('Desc. max %',d.desc_pct>0?(d.desc_pct*100).toFixed(2)+'%':'No aplica (Torres 1)',
         'Desc. max $',d.desc_monto>0?fM(d.desc_monto):'No aplica (Torres 1)',
         d.desc_pct>0?green:null, d.desc_monto>0?green:null);
    y+=2;
  }

  const mD=parseFloat($('s_montoD').value)||0;
  const mPct=parseFloat($('s_montoPct').value)||0;
  const dD=parseFloat($('s_descD').value)||0;
  const dPct=parseFloat($('s_descPct').value)||0;
  const saldo=parseFloat(d.saldo)||0;
  const descMax=parseFloat(d.desc_monto)||0;
  const monto=mD>0?mD:(mPct>0?mPct/100*saldo:0);
  const desc=dD>0?dD:(dPct>0?dPct/100*monto:0);
  const resto=Math.max(saldo-monto,0);
  const pctM=saldo>0?monto/saldo*100:0;
  const pctD=monto>0?desc/monto*100:0;

  if (monto>0) {
    secHdr('Simulador de Descuento',purple);
    row2('Monto adelantado $',fM(monto),'Monto adelantado % del saldo',pctM.toFixed(2)+'%',purple,purple);
    row1('Pago adelantado sin descuento',fM(monto),purple);
    row2('Descuento %',pctD.toFixed(2)+'%','Descuento $',fM(desc),purple,purple);
    row1('Saldo restante (despues del descuento)',fM(resto),red);

    if (desc>0) {
      let badgeText='', badgeColor=null;
      if (descMax>0) {
        badgeText=desc>descMax?'EXCEDE el descuento maximo de '+fM(descMax):'Dentro del limite - max '+fM(descMax);
        badgeColor=desc>descMax?red:green;
      } else if (mode==='empresa') {
        badgeText='Cliente de Torres 1 - sin limite de descuento definido';
        badgeColor=purple;
      }
      if (badgeText) {
        pdf.setFillColor(...(desc>descMax&&descMax>0?[254,243,199]:desc<=descMax&&descMax>0?[220,252,231]:[245,238,248]));
        pdf.rect(margin,y,pageW-margin*2,8,'F');
        pdf.setTextColor(...badgeColor); pdf.setFontSize(8); pdf.setFont('helvetica','bold');
        pdf.text(badgeText,margin+3,y+5.5); y+=10;
      }
      y+=2;
    }
  }

  if (d.acuerdo) {
    secHdr('Acuerdo',red);
    const lines=pdf.splitTextToSize(d.acuerdo,pageW-margin*2-4);
    const boxH=Math.max(12,lines.length*5+4);
    pdf.setFillColor(...gray); pdf.rect(margin,y,pageW-margin*2,boxH,'F');
    pdf.setDrawColor(...border); pdf.rect(margin,y,pageW-margin*2,boxH,'S');
    pdf.setTextColor(...dark); pdf.setFontSize(9); pdf.setFont('helvetica','normal');
    pdf.text(lines,margin+2,y+6); y+=boxH+4;
  }

  const suffix=mode==='empresa'?'Empresa':'Cliente';
  pdf.save(`Ficha_${suffix}_${curClient.replace(/[^a-zA-Z0-9]/g,'_')}_${d.torre}_${d.depto}.pdf`);
}
