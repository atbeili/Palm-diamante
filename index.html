<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Palm Diamante - Ficha de Cliente</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --navy:#1B2A4A; --navy2:#243860; --gold:#C8963E; --gold-lt:#FFF8E7; --gold-bd:#F0C040;
  --green:#1D7A34; --green-lt:#EAF4EA; --red:#C0392B; --purple:#7D3C98; --purple-lt:#F5EEF8;
  --amber:#7D6608; --blue:#1A5276; --gray-lt:#F7F7F7; --gray-bd:#E0E0E0; --text:#1A1A1A; --muted:#888;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#EEF2F7;color:var(--text);}
.topbar{background:var(--navy);color:#fff;padding:14px 20px;}
.topbar h1{font-size:18px;font-weight:700;}
.topbar p{font-size:11px;color:#99b3dd;margin-top:2px;}
.wrap{max-width:900px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:14px;overflow:hidden;}
.card-head{padding:10px 16px;font-size:11px;font-weight:700;color:#fff;letter-spacing:.5px;text-transform:uppercase;}
.card-body{padding:14px 16px;}

/* Update bar */
.update-bar{background:var(--green);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.update-bar p{font-size:12px;opacity:.85;margin:0;}
.update-bar strong{font-size:13px;}
.upload-label{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--green);border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.upload-label:hover{background:#f0fff4;}

.drive-update-btn{display:inline-flex;align-items:center;gap:8px;background:#1B2A4A;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.drive-update-btn:hover{background:#243860;}
#fileInput{display:none;}

/* Search */
.suggestions{position:relative;}
.search-wrap{display:flex;gap:8px;align-items:center;}
input[type=text],select{width:100%;padding:10px 14px;font-size:14px;font-weight:600;border:2px solid var(--gold-bd);border-radius:8px;background:var(--gold-lt);outline:none;color:var(--navy);font-family:inherit;}
input[type=text]:focus,select:focus{border-color:var(--gold);}
.btn{padding:10px 18px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;}
.btn-clear{background:#E5E7EB;color:#555;}
.btn-clear:hover{background:#D1D5DB;}
.sugg-list{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:2px solid var(--gold);border-radius:12px;max-height:360px;overflow-y:auto;z-index:1000;box-shadow:0 16px 40px rgba(0,0,0,.2);display:none;}
.sugg-item{padding:14px 18px;font-size:13px;cursor:pointer;border-bottom:1px solid #F0F0F0;line-height:1.4;}
.sugg-item:hover{background:var(--gold-lt);font-weight:600;color:var(--navy);}
.sugg-item:first-child{border-radius:10px 10px 0 0;}
.sugg-item:last-child{border-bottom:none;border-radius:0 0 10px 10px;}
.sugg-count{padding:6px 18px;font-size:11px;color:var(--muted);background:#fafafa;border-top:1px solid #F0F0F0;border-radius:0 0 10px 10px;}

/* Depto */
.depto-row{display:none;margin-top:10px;align-items:center;gap:10px;}
.depto-row.show{display:flex;}
.depto-lbl{font-size:12px;font-weight:700;color:var(--navy);white-space:nowrap;}
.depto-badge{background:var(--purple-lt);color:var(--purple);font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;white-space:nowrap;}

/* Fields */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid1{display:grid;gap:8px;}
.f{display:flex;flex-direction:column;gap:3px;}
.f-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.f-val{font-size:13px;padding:7px 10px;background:var(--gray-lt);border:1px solid var(--gray-bd);border-radius:6px;min-height:34px;word-break:break-word;}
.f-val.money{color:var(--navy);font-weight:700;}
.f-val.red{color:var(--red);font-weight:700;}
.f-val.green{color:var(--green);font-weight:700;}
.f-val.dim{color:var(--muted);font-style:italic;}

/* Simulator */
.sim-row{display:grid;grid-template-columns:1fr 32px 1fr;gap:6px;align-items:end;margin-bottom:8px;}
.sim-arrow{text-align:center;font-size:14px;color:var(--muted);padding-bottom:8px;}
.sim-group{display:flex;flex-direction:column;gap:4px;}
.sim-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
input.sim-inp{width:100%;padding:9px 12px;font-size:13px;font-weight:700;color:#0000CC;background:var(--gold-lt);border:2px solid var(--gold-bd);border-radius:8px;text-align:right;font-family:inherit;}
input.sim-inp:focus{border-color:var(--gold);outline:none;}
.sim-hint{font-size:10px;color:var(--muted);font-style:italic;}
.divider{height:1px;background:var(--gray-bd);margin:12px 0;}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.res-item{background:var(--green-lt);border:1px solid #C8E6C9;border-radius:8px;padding:10px 12px;}
.res-item.wide{grid-column:1/-1;}
.res-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.res-val{font-size:16px;font-weight:700;color:var(--green);}
.res-val.red{color:var(--red);}
.res-val.purple{color:var(--purple);}
.res-val.navy{color:var(--navy);}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-ok{background:#DCFCE7;color:#166534;}
.badge-warn{background:#FEF3C7;color:#92400E;}
.badge-info{background:var(--purple-lt);color:var(--purple);}

/* PDF buttons */
.pdf-btns{display:none;position:fixed;bottom:24px;right:24px;flex-direction:column;gap:10px;z-index:999;}
.pdf-btns.visible{display:flex;}
.print-btn{display:flex;align-items:center;gap:8px;border:none;border-radius:50px;padding:13px 22px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);transition:transform .1s;}
.print-btn:hover{transform:translateY(-1px);}
.print-btn.empresa{background:var(--navy);color:#fff;}
.print-btn.cliente{background:var(--green);color:#fff;}

/* Toast */
.toast{position:fixed;top:16px;right:16px;background:var(--green);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;display:none;}
.toast.error{background:var(--red);}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-style:italic;font-size:14px;}

@media(max-width:580px){
  .grid2,.res-grid,.sim-row{grid-template-columns:1fr;}
  .sim-arrow{display:none;}
  .res-item.wide{grid-column:1;}
}

.search-by-depto {
  display:flex; gap:8px; align-items:center; margin-top:10px; flex-wrap:wrap;
}
.search-by-depto .sep {
  font-size:11px; color:var(--muted); font-weight:700; white-space:nowrap;
}
.torre-select {
  padding:9px 12px; font-size:13px; font-weight:600;
  border:2px solid var(--gold-bd); border-radius:8px;
  background:var(--gold-lt); outline:none; color:var(--navy);
  font-family:inherit; min-width:90px;
}
.torre-select:focus { border-color:var(--gold); }
.depto-input {
  flex:1; padding:9px 12px; font-size:13px; font-weight:600;
  border:2px solid var(--gold-bd); border-radius:8px;
  background:var(--gold-lt); outline:none; color:var(--navy);
  font-family:inherit; min-width:80px;
}
.depto-input:focus { border-color:var(--gold); }
.btn-buscar {
  padding:9px 18px; background:var(--navy); color:#fff;
  border:none; border-radius:8px; font-size:13px; font-weight:700;
  font-family:inherit; cursor:pointer; white-space:nowrap;
}
.btn-buscar:hover { background:var(--navy2); }
.depto-result {
  margin-top:8px; padding:8px 12px; background:var(--purple-lt);
  border-radius:8px; font-size:12px; color:var(--purple); font-weight:600;
  display:none;
}



/* Seguimiento comercial */
.follow-card textarea,
.follow-card input,
.follow-card select {
  width:100%; padding:9px 12px; font-size:13px; border:2px solid var(--gold-bd); border-radius:8px;
  background:var(--gold-lt); outline:none; font-family:inherit; color:var(--navy);
}
.follow-card textarea { resize:vertical; min-height:80px; }
.follow-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.btn-save-follow{background:var(--navy);color:#fff;}
.btn-save-follow:hover{background:var(--navy2);}
.follow-status{font-size:12px;color:var(--muted);margin-top:8px;font-weight:600;}
.hist-list{margin-top:8px;display:grid;gap:6px;}
.hist-item{background:var(--gray-lt);border:1px solid var(--gray-bd);border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.35;}
.hist-meta{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;}
.hist-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.hist-mini-btn{border:none;border-radius:6px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.hist-mini-btn.edit{background:var(--gold-lt);color:var(--amber);border:1px solid var(--gold-bd);}
.hist-mini-btn.delete{background:#FDECEC;color:var(--red);border:1px solid #F5B7B1;}

/* Timeline de seguimiento */
.hist-list.timeline{position:relative;margin-top:12px;padding-left:24px;display:grid;gap:10px;}
.hist-list.timeline:before{content:"";position:absolute;left:8px;top:4px;bottom:4px;width:2px;background:var(--gray-bd);}
.hist-list.timeline .hist-item{position:relative;background:#fff;border:1px solid var(--gray-bd);border-radius:10px;padding:10px 12px;box-shadow:0 1px 5px rgba(0,0,0,.04);}
.hist-list.timeline .hist-item:before{content:"";position:absolute;left:-22px;top:14px;width:12px;height:12px;border-radius:50%;background:var(--gold);border:3px solid #fff;box-shadow:0 0 0 1px var(--gold-bd);}
.timeline-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:4px;}
.timeline-title{font-size:13px;font-weight:800;color:var(--navy);}
.timeline-date{font-size:10px;font-weight:700;color:var(--muted);white-space:nowrap;}
.timeline-resp{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px;}
.timeline-note{font-size:12px;line-height:1.45;color:var(--text);white-space:normal;}
.print-btn.interno{background:var(--purple);color:#fff;}

.estado-combo{position:relative;display:flex;gap:6px;align-items:stretch;}
.estado-combo input{flex:1;}
.estado-toggle{width:42px;border:2px solid var(--gold-bd);border-radius:8px;background:var(--gold-lt);color:var(--navy);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.estado-toggle:hover{border-color:var(--gold);background:#fff3cf;}
.estado-options{display:none;position:absolute;left:0;right:0;top:calc(100% + 5px);background:#fff;border:2px solid var(--gold);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.18);z-index:2500;max-height:230px;overflow-y:auto;}
.estado-options.show{display:block;}
.estado-opt{padding:10px 12px;font-size:13px;color:var(--navy);cursor:pointer;border-bottom:1px solid #eee;background:#fff;}
.estado-opt:hover{background:var(--gold-lt);font-weight:700;}
.estado-opt:last-child{border-bottom:none;}
.estado-empty{padding:10px 12px;font-size:12px;color:var(--muted);font-style:italic;}



/* Layout tipo Pipedrive para actividades */
.activity-card .activity-body{padding:16px;}
.activity-title-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:10px;}
.activity-icon{width:38px;height:38px;border:2px solid var(--gold-bd);border-radius:8px;background:var(--gold-lt);display:flex;align-items:center;justify-content:center;color:var(--navy);font-weight:800;font-size:18px;flex:0 0 auto;}
.activity-main-field{flex:1;}
.activity-main-field input{font-size:18px;font-weight:800;min-height:46px;}
.activity-type-strip{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 12px 50px;}
.activity-type-strip button{border:1px solid var(--gray-bd);background:#fff;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;font-family:inherit;}
.activity-type-strip button:hover{border-color:var(--gold);background:var(--gold-lt);}
.activity-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;}
.activity-actions{justify-content:flex-end;border-top:1px solid var(--gray-bd);padding-top:12px;margin-top:12px;}
.activity-actions .btn-save-follow{background:var(--green);}
.activity-actions .btn-save-follow:hover{background:#166534;}
@media(max-width:580px){.activity-grid{grid-template-columns:1fr}.activity-type-strip{margin-left:0}.activity-title-row{align-items:stretch}.activity-icon{display:none}}



/* Dashboard de seguimiento V2 */
.dashboard-card{padding:0;}
.dash-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.dash-title{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:.2px;}
.dash-sub{font-size:12px;color:#445; margin-top:4px;}
.dash-date{font-size:12px;color:var(--muted);font-weight:700;background:#F8FAFC;border:1px solid #E5E7EB;border-radius:999px;padding:7px 12px;}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0 16px;}
.dash-tile{border:1px solid #E5E7EB;border-radius:12px;background:#fff;padding:14px 14px;cursor:pointer;transition:.15s;min-height:118px;}
.dash-tile:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.08);}
.dash-tile.active{box-shadow:0 0 0 2px var(--navy) inset;}
.dash-icon{font-size:22px;margin-bottom:8px;}
.dash-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.dash-num{font-size:30px;font-weight:900;line-height:1;}
.dash-caption{font-size:11px;color:#4B5563;margin-top:8px;line-height:1.35;}
.dash-red{border-color:#F4B4AC;background:#FFF7F7;color:#C0392B;}
.dash-orange{border-color:#FDBA74;background:#FFF7ED;color:#EA580C;}
.dash-yellow{border-color:#FDE68A;background:#FFFBEB;color:#D97706;}
.dash-blue{border-color:#BFDBFE;background:#EFF6FF;color:#2563EB;}
.dash-purple{border-color:#DDD6FE;background:#F5F3FF;color:#7C3AED;}
.dash-teal{border-color:#99F6E4;background:#F0FDFA;color:#0D9488;}
.dash-green{border-color:#BBF7D0;background:#F0FDF4;color:#15803D;}
.dash-gray{border-color:#D1D5DB;background:#F9FAFB;color:#4B5563;}
.dashboard-layout{display:block;}.dash-table-card{width:100%;}.dash-side{display:none!important;}
.dash-table-card{border:1px solid #E5E7EB;border-radius:12px;background:#fff;overflow:hidden;}
.dash-table-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-bottom:1px solid #E5E7EB;}
.dash-table-title{font-size:13px;font-weight:900;color:var(--navy);text-transform:uppercase;letter-spacing:.3px;}
.dash-table{width:100%;border-collapse:collapse;font-size:12px;}
.dash-table th{background:var(--navy);color:#fff;text-align:left;font-size:11px;padding:9px 10px;}
.dash-table td{padding:9px 10px;border-bottom:1px solid #EEF2F7;vertical-align:middle;}
.dash-table tr:hover{background:#F8FAFC;}
.status-pill{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:800;background:#F3F4F6;color:#374151;}
.status-pill.red{background:#FEE2E2;color:#B91C1C;}
.status-pill.orange{background:#FFEDD5;color:#C2410C;}
.status-pill.yellow{background:#FEF3C7;color:#92400E;}
.status-pill.blue{background:#DBEAFE;color:#1D4ED8;}
.status-pill.green{background:#DCFCE7;color:#166534;}
.btn-mini-open{background:var(--navy);color:#fff;border:none;border-radius:7px;padding:7px 10px;font-size:11px;font-weight:800;cursor:pointer;}
.btn-mini-open:hover{background:var(--navy2);}
.btn-mini-clear{background:#E5E7EB;color:#374151;border:none;border-radius:7px;padding:7px 10px;font-size:11px;font-weight:800;cursor:pointer;margin-left:6px;}
.btn-mini-clear:hover{background:#D1D5DB;}
.dash-side{display:grid;gap:10px;}
.quick-box{border:1px solid #E5E7EB;background:#fff;border-radius:12px;padding:12px;}
.quick-box h4{font-size:12px;color:var(--navy);margin-bottom:8px;text-transform:uppercase;letter-spacing:.3px;}
.quick-box input,.quick-box select{font-size:12px;padding:8px 10px;margin-bottom:7px;}
.quick-box .btn-buscar{width:100%;}
.next-contact-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.summary-box{border:1px solid #E5E7EB;border-radius:10px;padding:10px;background:#fff;}
.summary-box .f-lbl{margin-bottom:6px;}
.summary-main{font-size:15px;font-weight:900;color:var(--navy);}
@media(max-width:900px){.dash-grid{grid-template-columns:repeat(2,1fr)}.dashboard-layout{grid-template-columns:1fr}.summary-strip{grid-template-columns:1fr 1fr}}
@media(max-width:580px){.dash-grid{grid-template-columns:1fr}.summary-strip{grid-template-columns:1fr}.dash-table{font-size:11px}.dash-table th,.dash-table td{padding:7px 6px}}
.convenio-card{
  width:100%;
}

.convenio-head{
  background:#0057b8;
  color:#fff;
  padding:10px 16px;
  font-weight:800;
  display:flex;
  align-items:center;
  gap:8px;
}

.conv-top-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:0;
  border-bottom:1px solid #e5e7eb;
}

.conv-metric{
  padding:14px 10px;
  text-align:center;
  border-right:1px solid #e5e7eb;
}

.conv-metric:last-child{
  border-right:none;
}

.conv-label{
  font-size:10px;
  font-weight:800;
  text-transform:uppercase;
  color:#667085;
  margin-bottom:6px;
}

.conv-value{
  font-size:15px;
  font-weight:900;
  color:#0b1f44;
}

.conv-blue{color:#0057b8;}
.conv-green{color:#0a7a2f;}
.conv-red{color:#c0392b;}

.conv-pill{
  display:inline-block;
  padding:6px 14px;
  border-radius:8px;
  background:#ffe4e6;
  color:#b91c1c;
  font-size:12px;
  font-weight:900;
}

.conv-info-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:0;
  padding:14px 10px;
  border-bottom:1px solid #e5e7eb;
}

.conv-info{
  padding:8px 10px;
  border-right:1px solid #e5e7eb;
}

.conv-info:last-child{
  border-right:none;
}

.conv-section-grid{
  display:grid;
  grid-template-columns:1.1fr 1.4fr .9fr;
  gap:12px;
  padding:14px;
}

.conv-box{
  border:1px solid #e5e7eb;
  border-radius:10px;
  padding:12px;
  background:#fff;
}

.conv-box h4{
  margin:0 0 10px 0;
  font-size:13px;
  color:#0057b8;
  text-transform:uppercase;
}

.conv-table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

.conv-table th{
  text-align:left;
  color:#0b1f44;
  font-size:10px;
  text-transform:uppercase;
  padding:8px;
  border-bottom:1px solid #e5e7eb;
}

.conv-table td{
  padding:8px;
  border-bottom:1px solid #f1f5f9;
}

.conv-pay-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.conv-input{
  width:100%;
  padding:9px 10px;
  border:1px solid #d0d5dd;
  border-radius:7px;
  font-weight:700;
}

.conv-btn{
  background:#0057b8;
  color:white;
  border:none;
  border-radius:7px;
  padding:10px;
  width:100%;
  font-weight:800;
  cursor:pointer;
  margin-top:10px;
}

.conv-warning{
  margin:0 14px 14px;
  background:#ffe4e6;
  color:#b91c1c;
  padding:10px 14px;
  border-radius:8px;
  font-weight:800;
  font-size:12px;
}

@media(max-width:900px){
  .conv-top-grid,
  .conv-info-grid,
  .conv-section-grid{
    grid-template-columns:1fr;
  }
}
  .convenio-card{width:100%;max-width:none;}
.convenio-head{background:#0057b8;color:#fff;padding:12px 16px;font-weight:800;border-radius:12px 12px 0 0;}
.convenio-top-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:0;
  border-bottom:1px solid #e5e7eb;
}
.convenio-metric{padding:14px 10px;text-align:center;border-right:1px solid #e5e7eb;}
.convenio-metric:last-child{border-right:none;}
.convenio-label{font-size:10px;font-weight:800;text-transform:uppercase;color:#667085;margin-bottom:6px;}
.convenio-value{font-size:15px;font-weight:900;color:#0b1f44;}
.convenio-blue{color:#0057b8;}
.convenio-green{color:#0a7a2f;}
.convenio-red{color:#c0392b;}
.convenio-section-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  padding:14px;
}
.convenio-box{border:1px solid #e5e7eb;border-radius:10px;padding:12px;background:#fff;}
.convenio-input{width:100%;padding:9px 10px;border:1px solid #d0d5dd;border-radius:7px;font-weight:700;}
.convenio-wide{grid-column:span 2;}
@media(max-width:900px){
  .convenio-top-grid{grid-template-columns:repeat(2,1fr);}
  .convenio-section-grid{grid-template-columns:1fr;}
  .convenio-wide{grid-column:auto;}
}


/* ===== Convenios v2 — diseño tipo mockup ===== */
.pd-conv-card{
  width:calc(100vw - 56px);
  max-width:1180px;
  margin-left:50%;
  transform:translateX(-50%);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 28px rgba(15,23,42,.12);
  border:1px solid #dbe3ee;
}
.pd-conv-head{
  background:#0057b8;
  color:#fff;
  padding:13px 18px;
  font-size:13px;
  font-weight:900;
  letter-spacing:.4px;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.pd-conv-head small{
  font-size:11px;
  font-weight:700;
  opacity:.9;
  text-transform:none;
  letter-spacing:0;
}
.pd-conv-body{padding:0;background:#fff;}
.pd-conv-metrics{
  display:grid;
 grid-template-columns:repeat(4,minmax(220px,1fr));
gap:0;
  border-bottom:1px solid #e5e7eb;
  background:#fff;
}
.pd-conv-metric{
  min-width:0;
box-sizing:border-box;
  min-height:82px;
  padding:12px 10px;
  border-right:1px solid #e5e7eb;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
}
.pd-conv-metric:last-child{border-right:none;}
.pd-conv-label{
  font-size:9.5px;
  line-height:1.15;
  color:#667085;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.35px;
}
.pd-conv-input,
.pd-conv-select{
  width:100%;
  box-sizing:border-box;
  height:34px;
  padding:7px 9px;
  border:1.5px solid #cbd5e1;
  border-radius:8px;
  background:#fffdf7;
  color:#0b1f44;
  font-size:12px;
  font-weight:800;
  font-family:inherit;
  outline:none;
}
.pd-conv-input[type="number"]{text-align:right;}
.pd-conv-input:focus,
.pd-conv-select:focus{border-color:#0057b8;box-shadow:0 0 0 2px rgba(0,87,184,.12);}
.pd-conv-input[readonly]{background:#f8fafc;color:#0b1f44;}
.pd-conv-status{
  height:34px;
  border:none;
  border-radius:9px;
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#b91c1c;
  background:#ffe4e6;
}
.pd-conv-status.vigente{color:#166534;background:#dcfce7;}
.pd-conv-status.cumplido{color:#1d4ed8;background:#dbeafe;}
.pd-conv-status.vencido{color:#b91c1c;background:#ffe4e6;}
.pd-conv-status.sin{color:#6b7280;background:#f3f4f6;}
.pd-conv-info{
  display:grid;
  grid-template-columns:1.1fr 1fr .8fr .9fr .8fr 1.15fr;
  gap:0;
  border-bottom:1px solid #e5e7eb;
  background:#f8fafc;
}
.pd-conv-info-item{padding:12px 10px;border-right:1px solid #e5e7eb;}
.pd-conv-info-item:last-child{border-right:none;}
.pd-conv-other{display:none;margin-top:7px;}
.pd-conv-main{
  display:grid;
  grid-template-columns:1.05fr 1.35fr 1fr;
  gap:12px;
  padding:14px;
  background:#fff;
}
.pd-conv-box{
  border:1px solid #dbe3ee;
  border-radius:12px;
  background:#fff;
  overflow:hidden;
}
.pd-conv-box h3{
  margin:0;
  padding:10px 12px;
  color:#0057b8;
  background:#f8fafc;
  font-size:11px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.35px;
  border-bottom:1px solid #e5e7eb;
}
.pd-conv-box-body{padding:12px;}
.pd-conv-table{width:100%;border-collapse:collapse;font-size:11px;}
.pd-conv-table th{padding:7px 6px;text-align:left;color:#475467;text-transform:uppercase;font-size:9px;border-bottom:1px solid #e5e7eb;}
.pd-conv-table td{padding:8px 6px;border-bottom:1px solid #f1f5f9;color:#111827;}
.pd-conv-empty{color:#98a2b3;font-style:italic;font-size:12px;padding:8px 0;}
.pd-conv-pay-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.pd-conv-file{font-size:11px;padding:7px 4px;border:1.5px dashed #cbd5e1;border-radius:8px;background:#f8fafc;width:100%;}
.pd-conv-btn{
  width:100%;
  margin-top:9px;
  background:#0057b8;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:10px 12px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
  font-family:inherit;
}
.pd-conv-btn:hover{background:#004494;}
.pd-conv-warning{
  margin:0 14px 14px;
  padding:10px 12px;
  background:#fff1f2;
  color:#b91c1c;
  border:1px solid #fecdd3;
  border-radius:10px;
  font-size:12px;
  font-weight:800;
  display:none;
}
.pd-conv-progress-wrap{height:8px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px;}
.pd-conv-progress{height:100%;width:0%;background:#16a34a;transition:width .2s;}
@media(max-width:1050px){
  .pd-conv-card{width:100%;margin-left:0;transform:none;}
  .pd-conv-metrics{grid-template-columns:repeat(2,1fr);}
  .pd-conv-info{grid-template-columns:repeat(2,1fr);}
  .pd-conv-main{grid-template-columns:1fr;}
}
@media(max-width:580px){
  .pd-conv-metrics,.pd-conv-info{grid-template-columns:1fr;}
  .pd-conv-pay-grid{grid-template-columns:1fr;}
}

</style>

function jsonpAction(params, onSuccess, onError) {
  const callbackName = 'palmAction_' + Date.now() + '_' + Math.floor(Math.random()*100000);
  const script = document.createElement('script');
  const url = new URL(SCRIPT_URL);
  Object.keys(params || {}).forEach(k => url.searchParams.set(k, params[k] == null ? '' : String(params[k])));
  url.searchParams.set('callback', callbackName);

  const timeout = setTimeout(() => {
    cleanup();
    if (onError) onError(new Error('Tiempo de espera agotado'));
  }, 45000);

  function cleanup() {
    clearTimeout(timeout);
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[callbackName] = function(resp) {
    cleanup();
    if (resp && resp.ok === false) {
      if (onError) onError(new Error(resp.error || 'Error desconocido'));
      return;
    }
    if (onSuccess) onSuccess(resp);
  };

  script.onerror = function() {
    cleanup();
    if (onError) onError(new Error('No se pudo conectar con Apps Script'));
  };

  script.src = url.toString();
  document.head.appendChild(script);
}

const DEFAULT_ESTADOS_SEGUIMIENTO = [
  'Llamada',
  'WhatsApp',
  'Reunión',
  'Propuesta enviada',
  'Seguimiento',
  'Promesa de pago',
  'Pago realizado',
  'No contestó',
  'No interesado',
  'Otro'
];
const LEGACY_ESTADOS_SEGUIMIENTO = [
  'Sin contactar',
  'Primer contacto',
  'Negociación',
  'Pendiente de respuesta',
  'Acuerdo verbal',
  'No localizable'
];
const DEFAULT_RESPONSABLES = ['Abraham','José'];
let ESTADOS_SEGUIMIENTO = DEFAULT_ESTADOS_SEGUIMIENTO.slice();
let RESPONSABLES_SEGUIMIENTO = DEFAULT_RESPONSABLES.slice();
const DEFAULT_ESTADOS_WHATSAPP = ['Sin contacto','Mensaje enviado','No contestó','Contestó','En seguimiento','Confirmó cita','Solicitó descuento','Solicitó cambio de departamento','Promesa de pago','Pago realizado','Convenio firmado','No interesado'];
let ESTADOS_WHATSAPP = DEFAULT_ESTADOS_WHATSAPP.slice();

function mergeUnique(primary, defaults) {
  const out = [];
  [...(primary || []), ...(defaults || [])].forEach(v => {
    const clean = String(v || '').trim();
    if (clean && !out.some(x => normalizeText(x) === normalizeText(clean))) out.push(clean);
  });
  return out;
}

function normalizeText(v) {
  return String(v || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
}

function renderComboOptions(type, values) {
  const isResp = type === 'responsable';
  const inputId = isResp ? 'segResponsable' : 'segEstado';
  const listId = isResp ? 'segResponsableOptions' : 'segEstadoOptions';
  const defaults = isResp ? DEFAULT_RESPONSABLES : DEFAULT_ESTADOS_SEGUIMIENTO;
  let incoming = values || [];
  if (isResp) {
    // Por ahora solo mostramos Abraham y José como responsables base.
    // Si escribes un responsable nuevo y lo guardas, también aparecerá en el menú.
    const ocultos = ['perla','genaro'];
    incoming = incoming.filter(v => !ocultos.includes(normalizeText(v)));
  } else {
    incoming = incoming.filter(v => {
      const n = normalizeText(v);
      return !LEGACY_ESTADOS_SEGUIMIENTO.some(x => normalizeText(x) === n);
    });
  }
  const merged = mergeUnique(incoming, defaults);
  if (isResp) RESPONSABLES_SEGUIMIENTO = merged; else ESTADOS_SEGUIMIENTO = merged;
  const lista = $(listId);
  if (lista) lista.innerHTML = merged.map(e => `<option value="${escapeHtml(e)}"></option>`).join('');
  renderComboDropdown(type, $(inputId) ? $(inputId).value : '');
}


function applyFollowupConfig(resp) {
  const cfg = (resp && resp.config) ? resp.config : (resp || {});
  if (Array.isArray(cfg.estados)) renderComboOptions('estado', cfg.estados);
  if (Array.isArray(cfg.responsables)) renderComboOptions('responsable', cfg.responsables);
  if (Array.isArray(cfg.estadosWhatsApp)) renderWhatsAppOptions(cfg.estadosWhatsApp);
}

function renderWhatsAppOptions(values) {
  ESTADOS_WHATSAPP = mergeUnique(values || [], DEFAULT_ESTADOS_WHATSAPP);
  const list = $('segEstadoWhatsAppOptions');
  if (list) list.innerHTML = ESTADOS_WHATSAPP.map(e => `<option value="${escapeHtml(e)}"></option>`).join('');
}

function dashTile(filter, icon, label, num, caption, cls) {
  return `<div class="dash-tile ${cls}" data-filter="${filter}" onclick="loadDashboard('${filter}')">
    <div class="dash-icon">${icon}</div>
    <div class="dash-label">${label}</div>
    <div class="dash-num" id="dashCount_${filter}">${num}</div>
    <div class="dash-caption">${caption}<br><strong>Ver lista →</strong></div>
  </div>`;
}

function normalizeDashboardFilter(filter) {
  const aliases = {
    futuro: 'pendientes',
    futuros: 'pendientes',
    pendientes: 'pendientes',
    promesasPago: 'propuestaEnviada',
    promesas: 'propuestaEnviada',
    propuestaEnviada: 'propuestaEnviada',
    convenioFirmado: 'convenioFirmado',
    noInteresado: 'noInteresado',
    cambioDepartamento: 'cambioDepartamento',
    vencidos: 'vencidos',
    hoy: 'hoy',
    proximos7: 'proximos7',
    sinFecha: 'sinFecha',
    resumen: 'resumen'
  };
  return aliases[filter] || filter || 'resumen';
}

function loadDashboard(filter='') {
  DASHBOARD_FILTER = filter || '';
  const apiFilter = normalizeDashboardFilter(filter || 'resumen');

  if (!$('content')) return;
  if (!$('dashTiles')) renderDashboardShell();

  jsonpAction({action:'getDashboard', filter: apiFilter}, function(resp){
    if (!resp || !resp.ok) return;

    const c = resp.counts || {};
    const buckets = resp.buckets || {};
    const setC = (k,v) => {
      const el = $('dashCount_' + k);
      if (el) el.textContent = v || 0;
    };

    setC('vencidos', c.vencidos);
    setC('hoy', c.hoy);
    setC('proximos7', c.proximos7);
    setC('pendientes', c.pendientes || c.futuros || c.futuro);
    setC('cambioDepartamento', c.cambioDepartamento);
    setC('propuestaEnviada', c.propuestaEnviada || c.promesas || c.promesasPago);
    setC('convenioFirmado', c.convenioFirmado);
    setC('noInteresado', c.noInteresado);

    document.querySelectorAll('.dash-tile').forEach(t =>
      t.classList.toggle('active', DASHBOARD_FILTER && t.dataset.filter === DASHBOARD_FILTER)
    );

    if (!DASHBOARD_FILTER || apiFilter === 'resumen') {
      DASHBOARD_ITEMS = [];
      renderDashboardTable('', []);
      return;
    }

    DASHBOARD_ITEMS = buckets[apiFilter] || [];
    renderDashboardTable(DASHBOARD_FILTER, DASHBOARD_ITEMS);
  }, function(err){
    const w=$('dashTableWrap');
    if(w) w.innerHTML='<div class="empty-state">No se pudo cargar el panel: '+escapeHtml(err.message)+'</div>';
  });
}

function clearDashboardList() {
  DASHBOARD_FILTER = '';
  DASHBOARD_ITEMS = [];
  document.querySelectorAll('.dash-tile').forEach(t => t.classList.remove('active'));
  renderDashboardTable('', []);
  loadDashboard('');
}


function refreshDashboardIfVisible() {
  if (document.getElementById('dashTiles') && typeof loadDashboard === 'function') {
    loadDashboard(DASHBOARD_FILTER || '');
  }
}

function normalizeKey(value) {
  return String(value == null ? '' : value)
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, '')
    .replace(/[^\w\d]/g, '');
}

function findClientKeyForDashboardItem(it) {
  const targetName = normalizeKey(it && it.cliente);
  const targetTorre = normalizeKey(it && it.torre);
  const targetDepto = normalizeKey(it && it.depto);

  const keys = Object.keys(DB || {});

  // Primero intenta encontrar cliente + torre + depto exactos.
  for (const key of keys) {
    const entries = DB[key] || [];
    if (normalizeKey(key) !== targetName) continue;
    const idx = entries.findIndex(e =>
      normalizeKey(e.torre) === targetTorre &&
      normalizeKey(e.depto) === targetDepto
    );
    if (idx >= 0) return { key, idx };
  }

  // Después intenta por torre + depto aunque el nombre venga con alguna diferencia.
  for (const key of keys) {
    const entries = DB[key] || [];
    const idx = entries.findIndex(e =>
      normalizeKey(e.torre) === targetTorre &&
      normalizeKey(e.depto) === targetDepto
    );
    if (idx >= 0) return { key, idx };
  }

  // Último recurso: solo por nombre.
  for (const key of keys) {
    if (normalizeKey(key) === targetName) return { key, idx: 0 };
  }

  return null;
}

function openDashboardClient(idx) {
  const it = DASHBOARD_ITEMS[idx];
  if (!it) return;

  const found = findClientKeyForDashboardItem(it);
  if (!found) {
    showToast('No encontré ese cliente/departamento en la base principal', true);
    return;
  }

  const name = found.key;
  if (inp) inp.value = name;

  curClient = name;
  const entries = DB[name] || [];
  const dr = $('deptoRow'), ds = $('deptoSel'), db = $('deptoBadge');

  if (entries.length > 1) {
    if (dr) dr.classList.add('show');
    if (ds) {
      ds.innerHTML = '<option value="">-- Selecciona un departamento --</option>' +
        entries.map((e,i) => `<option value="${i}">Torre ${e.torre} - Depto ${e.depto}</option>`).join('');
      ds.value = String(found.idx);
    }
    if (db) db.textContent = entries.length + ' deptos';
    curData = entries[found.idx];
    renderFicha(curData);
    loadSeguimientoActual();
  } else if (entries.length === 1) {
    if (dr) dr.classList.remove('show');
    curData = entries[0];
    renderFicha(curData);
    loadSeguimientoActual();
  } else {
    showToast('No encontré departamentos para ese cliente', true);
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

  return `${yyyy}-${mm}-${dd}`;
}

function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function escapeJs(str) {
  return String(str == null ? '' : str)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '');
}

function onInput() {
  if (!inp) return;
  const q = inp.value.trim().toUpperCase();
  if (!q) { hideSugg(); return; }
  // Clear depto search when typing by name
  const ts = $('torreSelect'); if(ts) ts.value='';
  const di = $('deptoInput'); if(di) di.value='';
  const dr = $('deptoResult'); if(dr) dr.style.display='none';
  const keys = Object.keys(DB);
  const matches = keys.filter(k => k.toUpperCase().includes(q));
  // Always show list — only auto-load if exactly 1 result
  if (matches.length === 1) {
    showSugg(matches, 1);
  } else {
    showSugg(matches.slice(0, 15), matches.length);
  }
}

function showSugg(matches, total) {
  const list = $('suggList');
  if (matches.length === 0) {
    list.innerHTML = '<div class="sugg-item" style="color:var(--muted);font-style:italic">No se encontro ningun cliente</div>';
  } else {
    const items = matches.map(m => `<div class="sugg-item" onclick="pickSugg('${m.replace(/'/g,"\'")}')">${m}</div>`).join('');
    const counter = total > matches.length ? `<div class="sugg-count">Mostrando ${matches.length} de ${total} &mdash; escribe mas para filtrar</div>` : '';
    list.innerHTML = items + counter;
  }
  list.style.display = 'block';
}

function attachSim(d) {
  const saldo = parseFloat(d.saldo)||0;
  const descMax = parseFloat(d.desc_monto)||0;
  let updating = false;

  function calc(source) {
    if (updating) return;
    updating = true;
    const mD   = parseFloat($('s_montoD').value)||0;
    const mPct = parseFloat($('s_montoPct').value)||0;
    const dD   = parseFloat($('s_descD').value)||0;
    const dPct = parseFloat($('s_descPct').value)||0;

    let monto = 0;
    if (source==='s_montoD' && mD>0) {
      monto=mD;
      $('s_montoPct').value = saldo>0 ? (mD/saldo*100).toFixed(2) : '';
    } else if (source==='s_montoPct' && mPct>0) {
      monto=mPct/100*saldo;
      $('s_montoD').value = monto.toFixed(2);
    } else if (mD>0) { monto=mD; }
    else if (mPct>0) { monto=mPct/100*saldo; }

    let desc = 0;
    if (source==='s_descD' && dD>0) {
      desc=dD;
      $('s_descPct').value = monto>0 ? (dD/monto*100).toFixed(2) : '';
    } else if (source==='s_descPct' && dPct>0) {
      desc=dPct/100*monto;
      $('s_descD').value = desc.toFixed(2);
    } else if (dD>0) { desc=dD; }
    else if (dPct>0) { desc=dPct/100*monto; }

    updating = false;

    if (monto===0) {
      ['r_montoD','r_montoPct','r_pago_sin','r_descPct','r_descD','r_pago_con','r_saldo'].forEach(id=>{const e=$(id);if(e)e.textContent='--';});
      return;
    }
    const resto = Math.max(saldo-monto, 0);
    const pctM  = saldo>0 ? monto/saldo*100 : 0;
    const pctD  = monto>0 ? desc/monto*100  : 0;

    $('r_montoD').textContent   = fmtM(monto);
    $('r_montoPct').textContent = pctM.toFixed(2)+'%';
    $('r_pago_sin').textContent = fmtM(monto);
    $('r_descPct').textContent  = pctD.toFixed(2)+'%';
    $('r_descD').textContent    = fmtM(desc);
    $('r_pago_con').textContent = fmtM(monto - desc);
    $('r_saldo').textContent    = fmtM(resto);

    // Validacion de descuento maximo no se muestra en pantalla
  }

  ['s_montoD','s_montoPct','s_descD','s_descPct'].forEach(id => {
    const el=$(id); if(!el) return;
    el.addEventListener('input', ()=>calc(id));
  });
}

function loadFromScript() {
  const bar   = $('updateBar');
  const title = $('updateTitle');
  const label = $('dataSourceLabel');

  // Show local data immediately
  const localCount = Object.keys(DB).length;
  if (bar)   bar.style.background = '#1D7A34';
  if (title) title.textContent = 'Datos locales (' + localCount + ' clientes)';
  if (label) label.innerHTML = localCount + ' clientes listos &mdash; sincronizando con Drive...';

  // Use JSONP to bypass CORS
  const callbackName = 'palmCallback_' + Date.now();
  const script = document.createElement('script');

  const timeout = setTimeout(() => {
    cleanup();
    if (title) title.textContent = 'Datos locales (' + Object.keys(DB).length + ' clientes)';
    if (label) label.innerHTML = Object.keys(DB).length + ' clientes &mdash; Drive no disponible';
  }, 10000);

  function cleanup() {
    clearTimeout(timeout);
    delete window[callbackName];
    if (script.parentNode) script.parentNode.removeChild(script);
  }

  window[callbackName] = function(raw) {
    cleanup();
    try {
      const toN = v => {
        if (v === null || v === undefined || v === '') return 0;
        let s = String(v).replace(/[$%,\s]/g,'').replace(/[()]/g,'');
        const n = parseFloat(s);
        return isNaN(n) ? 0 : n;
      };
      const toS = v => (v === null || v === undefined) ? '' : String(v).trim();

      const norm = v => toS(v)
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/\s+/g,' ')
        .trim();

      function findHeaderAndColumns(rows) {
        let best = null;

        for (let i = 0; i < Math.min(rows.length, 30); i++) {
          const row = rows[i] || [];
          const normalized = row.map(norm);

          const idxCliente = normalized.findIndex(x => x === 'cliente' || x.includes('cliente'));
          const idxDepto   = normalized.findIndex(x => x === 'depto' || x.includes('depto') || x.includes('departamento'));
          const idxTorre   = normalized.findIndex(x => x === 'torre' || x.includes('torre'));

          if (idxCliente >= 0 && idxDepto >= 0 && idxTorre >= 0) {
            best = { headerIndex: i, normalized };
            break;
          }
        }

        // Si no encuentra encabezados, usa el formato conocido de Palm Diamante:
        // A:# B:Torre C:Nivel D:Depto E:Cliente...
        if (!best) {
          return {
            headerIndex: 3,
            c: {
              torre:1, nivel:2, depto:3, cliente:4, tel:5, estatus:6, vendedor:7, fecha:8,
              precio:9, precio_m2:10, depositos:11, efectivo:12, dep_ef:13, enganche:14,
              doc:15, pago_final:16, saldo:17, vencido:18, venc_desde:19, ant:20,
              nota:21, desc_pct:22, desc_monto:23, acuerdo:24
            }
          };
        }

        const h = best.normalized;
        const find = (...names) => {
          for (const name of names) {
            const target = norm(name);
            let idx = h.findIndex(x => x === target);
            if (idx >= 0) return idx;
            idx = h.findIndex(x => x.includes(target));
            if (idx >= 0) return idx;
          }
          return -1;
        };

        const c = {
          torre:      find('torre'),
          nivel:      find('nivel'),
          depto:      find('depto', 'departamento'),
          cliente:    find('cliente'),
          tel:        find('telefono', 'teléfono', 'celular'),
          estatus:    find('estatus', 'status'),
          vendedor:   find('vendedor'),
          fecha:      find('fecha venta'),
          precio:     find('precio venta'),
          precio_m2:  find('precio m2', 'precio m²'),
          depositos:  find('depositos', 'depósitos'),
          efectivo:   find('efectivo'),
          dep_ef:     find('dep+efectivo', 'dep + efectivo'),
          enganche:   find('% enganche', 'enganche'),
          doc:        find('documentado'),
          pago_final: find('pago final'),
          saldo:      find('saldo que debe', 'saldo'),
          vencido:    find('vencido'),
          venc_desde: find('vencido desde'),
          ant:        find('antiguedad', 'antigüedad', 'tiempo vencido'),
          nota:       find('nota', 'notas'),
          desc_pct:   find('desc. max %', 'desc max %', 'descuento maximo %', 'descuento máximo %'),
          desc_monto: find('desc. max $', 'desc max $', 'descuento maximo $', 'descuento máximo $'),
          acuerdo:    find('acuerdo')
        };

        // Fallback por posición para columnas que no encontró por nombre.
        const fallback = {
          torre:1, nivel:2, depto:3, cliente:4, tel:5, estatus:6, vendedor:7, fecha:8,
          precio:9, precio_m2:10, depositos:11, efectivo:12, dep_ef:13, enganche:14,
          doc:15, pago_final:16, saldo:17, vencido:18, venc_desde:19, ant:20,
          nota:21, desc_pct:22, desc_monto:23, acuerdo:24
        };

        Object.keys(fallback).forEach(k => {
          if (c[k] < 0) c[k] = fallback[k];
        });

        return { headerIndex: best.headerIndex, c };
      }

      const parsed = findHeaderAndColumns(raw);
      const hi = parsed.headerIndex;
      const c = parsed.c;

      const newClients = {};

      for (let i = hi + 1; i < raw.length; i++) {
        const r = raw[i];
        if (!r || !Array.isArray(r)) continue;

        const name = toS(r[c.cliente]).toUpperCase();
        const torre = toS(r[c.torre]);
        const depto = toS(r[c.depto]);

        if (!name || name.length < 3) continue;
        if (!torre && !depto) continue;

        const lowName = name.toLowerCase();
        if (['cliente','total','subtotal','totales'].some(x => lowName === x)) continue;
        if (lowName.includes('palm diamante') || lowName.includes('todas las torres')) continue;

        const e = {
          torre:torre,
          nivel:toS(r[c.nivel]),
          depto:depto,
          tel:toS(r[c.tel]),
          estatus:toS(r[c.estatus]),
          vendedor:toS(r[c.vendedor]),
          fecha:toS(r[c.fecha]).slice(0,10),
          precio:toN(r[c.precio]),
          precio_m2:toN(r[c.precio_m2]),
          depositos:toN(r[c.depositos]),
          efectivo:toN(r[c.efectivo]),
          dep_ef:toN(r[c.dep_ef]),
          enganche:toN(r[c.enganche]),
          doc:toN(r[c.doc]),
          pago_final:toN(r[c.pago_final]),
          saldo:toN(r[c.saldo]),
          vencido:toN(r[c.vencido]),
          venc_desde:toS(r[c.venc_desde]),
          ant:toS(r[c.ant]),
          nota:toS(r[c.nota]),
          desc_pct:toN(r[c.desc_pct]),
          desc_monto:toN(r[c.desc_monto]),
          acuerdo:toS(r[c.acuerdo])
        };

        if (!newClients[name]) newClients[name] = [];
        newClients[name].push(e);
      }

      const count = Object.keys(newClients).length;
      if (count === 0) throw new Error('Sin clientes');

      Object.keys(DB).forEach(k => delete DB[k]);
      Object.assign(DB, newClients);

      // Refresh current client view if one is loaded
      if (curData && curClient) {
        const entries = DB[curClient];
        if (entries) {
          const sel = $('deptoSel');
          if (sel && sel.value) {
            curData = entries[parseInt(sel.value)];
          } else {
            curData = entries[0];
          }
          renderFicha(curData);
        }
      }

      if (bar)   bar.style.background = '#1D7A34';
      if (title) title.textContent = 'Sincronizado con Google Sheets';
      if (label) label.innerHTML = count + ' clientes actualizados automaticamente';
    } catch(err) {
      console.warn('JSONP parse error:', err.message);
      if (title) title.textContent = 'Datos locales (' + Object.keys(DB).length + ' clientes)';
      if (label) label.innerHTML = Object.keys(DB).length + ' clientes cargados';
    }
  };

  script.onerror = function() {
    cleanup();
    if (title) title.textContent = 'Datos locales (' + Object.keys(DB).length + ' clientes)';
    if (label) label.innerHTML = Object.keys(DB).length + ' clientes &mdash; Drive no disponible';
  };

  script.src = SCRIPT_URL + '?callback=' + callbackName;
  document.head.appendChild(script);
}


function searchByDepto() {
  const torre = $('torreSelect').value.trim().toUpperCase();
  const depto = $('deptoInput').value.trim().toUpperCase();
  const result = $('deptoResult');

  // Clear previous name search
  if (inp) inp.value = '';
  hideSugg();

  if (!depto) {
    result.style.display = 'block';
    result.textContent = 'Escribe el numero de departamento';
    return;
  }
  
  // Clear previous content while searching
  curClient = null; curData = null;
  $('deptoRow').classList.remove('show');
  $('pdfBtns').classList.remove('visible');
  $('content').innerHTML = '<div class="card"><div class="card-body"><div class="empty-state">Buscando...</div></div></div>';

  // Search all clients for matching torre+depto
  const matches = [];
  Object.entries(DB).forEach(([name, entries]) => {
    entries.forEach((e, idx) => {
      const torreMatch = !torre || e.torre.toUpperCase() === torre;
      const deptoMatch = e.depto.toString().toUpperCase() === depto;
      if (torreMatch && deptoMatch) {
        matches.push({ name, entry: e, idx });
      }
    });
  });

  if (matches.length === 0) {
    result.style.display = 'block';
    result.style.background = 'var(--red-lt)';
    result.style.color = 'var(--red)';
    result.textContent = 'No se encontro ningun departamento con esos datos';
    return;
  }

  if (matches.length === 1) {
    result.style.display = 'none';
    const m = matches[0];
    // Load client
    inp.value = m.name;
    hideSugg();
    curClient = m.name;
    const entries = DB[m.name];
    if (entries.length > 1) {
      const dr = $('deptoRow'), ds = $('deptoSel'), db = $('deptoBadge');
      dr.classList.add('show');
      ds.innerHTML = '<option value="">-- Selecciona un departamento --</option>' +
        entries.map((e,i) => `<option value="${i}"${i===m.idx?' selected':''}>Torre ${e.torre} - Depto ${e.depto}</option>`).join('');
      db.textContent = entries.length + ' deptos';
      ds.value = m.idx;
      curData = entries[m.idx];
    } else {
      $('deptoRow').classList.remove('show');
      curData = entries[0];
    }
    renderFicha(curData);
  } else {
    // Multiple matches — show list
    result.style.display = 'block';
    result.style.background = 'var(--purple-lt)';
    result.style.color = 'var(--purple)';
    result.innerHTML = 'Se encontraron ' + matches.length + ' resultados:<br>' +
      matches.map(m => `<span style="cursor:pointer;text-decoration:underline;margin-right:12px" onclick="
        inp.value='${m.name.replace(/'/g,"\'")}';
        hideSugg();
        loadClient('${m.name.replace(/'/g,"\'")}');
        $('deptoResult').style.display='none';
      ">${m.name} — Torre ${m.entry.torre} Depto ${m.entry.depto}</span>`).join('<br>');
  }
}

function loadExcelFile(event) {
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e) {
    try {
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
      let sheetName=wb.SheetNames.find(s=>s.includes('Cobranza')||s.includes('cobranza'));
      if(!sheetName) sheetName=wb.SheetNames[0];
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      let hi=-1;
      for(let i=0;i<Math.min(rows.length,10);i++){
        if(rows[i]&&String(rows[i][4]||'').toLowerCase().includes('cliente')){hi=i;break;}
      }
      if(hi===-1) hi=4;
      const toN=v=>{if(!v)return 0;const n=parseFloat(String(v).replace(/[$%,\s]/g,''));return isNaN(n)?0:n;};
      const toS=v=>v===null||v===undefined?'':String(v).trim();
      const newDB={};
      for(let i=hi+1;i<rows.length;i++){
        const r=rows[i]; if(!r) continue;
        const name=toS(r[4]); if(!name||name.length<3) continue;
        if(['cliente','total','subtotal','totales'].includes(name.toLowerCase())) continue;
        const e={torre:toS(r[1]),nivel:toS(r[2]),depto:toS(r[3]),tel:toS(r[5]),estatus:toS(r[6]),
          vendedor:toS(r[7]),fecha:toS(r[8]).slice(0,10),precio:toN(r[9]),precio_m2:toN(r[10]),
          depositos:toN(r[11]),efectivo:toN(r[12]),dep_ef:toN(r[13]),enganche:toN(r[14]),
          doc:toN(r[15]),pago_final:toN(r[16]),saldo:toN(r[17]),vencido:toN(r[18]),
          venc_desde:toS(r[19]),ant:toS(r[20]),nota:toS(r[21]),
          desc_pct:toN(r[22]),desc_monto:toN(r[23]),acuerdo:toS(r[24])};
        if(!newDB[name]) newDB[name]=[];
        newDB[name].push(e);
      }
      const count=Object.keys(newDB).length;
      if(count===0){showToast('No se encontraron clientes',true);return;}
      Object.keys(DB).forEach(k=>delete DB[k]);
      Object.assign(DB,newDB);
      $('dataSourceLabel').textContent=count+' clientes cargados desde '+file.name;
      clearAll();
      showToast('Actualizado: '+count+' clientes cargados');
    } catch(err){showToast('Error: '+err.message,true);}
    event.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function actualizarEstadoConvenio(){
  const cleanMoney = v => Number(String(v || '').replace(/[$,\s]/g,'')) || 0;
  const money = n => '$' + Number(n || 0).toLocaleString('es-MX', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });

  const totalEl = document.getElementById('convMontoTotal');
  const pagadoEl = document.getElementById('convMontoPagado');
  const pagoMontoEL = document.getElementById('convPagoMonto');
  const descEl = document.getElementById('convDescuentoCondicionado');

  const total = cleanMoney(totalEl?.value);
  const pagado = cleanMoney(pagadoEl?.value);
  const descuento = cleanMoney(descEl?.value);
  const prox = document.getElementById('convProximoPago')?.value;

  const estado = document.getElementById('convEstado');
  const warning = document.getElementById('convWarning');
  const restanteEl = document.getElementById('convMontoRestante');
  const cumplimientoEl = document.getElementById('convCumplimiento');
  const progressEl = document.getElementById('convProgress');

if (document.activeElement !== totalEl) {
    totalEl.value = money(total);
}

if (document.activeElement !== pagadoEl) {
    pagadoEl.value = money(pagado);
}
  if (descEl && document.activeElement !== descEl) {
  descEl.value = money(descuento);
}
  if (pagoMontoEL && document.activeElement !== pagoMontoEL) {
    pagoMontoEL.value = money(cleanMoney(pagoMontoEL.value));
}

  const restante = Math.max(total - pagado, 0);
  const avance = total > 0 ? Math.min(100, Math.round((pagado / total) * 100)) : 0;

  if(restanteEl) restanteEl.value = total ? money(restante) : '$0.00';
  if(cumplimientoEl) cumplimientoEl.value = avance + '%';
  if(progressEl) progressEl.style.width = avance + '%';

  if(!estado) return;

  estado.classList.remove('sin','vigente','vencido','cumplido');
  if(warning) warning.style.display = 'none';

  const hoy = new Date();
  hoy.setHours(0,0,0,0);

  if(!total){
    estado.value = 'Sin convenio';
    estado.classList.add('sin');
  }else if(restante <= 0){
    estado.value = 'Cumplido';
    estado.classList.add('cumplido');
  }else if(prox && new Date(prox + 'T00:00:00') < hoy){
    estado.value = 'Vencido';
    estado.classList.add('vencido');
    if(warning) warning.style.display = 'block';
  }else{
    estado.value = 'Vigente';
    estado.classList.add('vigente');
  }
  actualizarCalendarioConvenio();
}

  const total = cleanMoney(totalEl?.value);
  const pagado = cleanMoney(pagadoEl?.value);

  if(!fechaPago){
    body.innerHTML = '<tr><td colspan="3" class="pd-conv-empty">Sin fechas de pago registradas</td></tr>';
    return;
  }

  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  const fecha = new Date(fechaPago + 'T00:00:00');

  let estado = 'Pendiente';

  if(pagado >= total && total > 0){
    estado = '✅ Pagado';
  }else if(fecha < hoy){
    estado = '🔴 Vencido';
  }else if(tipo === 'Pago único'){
    estado = '🟡 Pago único pendiente';
  }else{
    estado = '🟡 Próximo pago';
  }

  body.innerHTML = `
    <tr>
      <td>${fechaPago.split('-').reverse().join('/')}</td>
      <td>${money(total)}</td>
      <td>${estado}</td>
    </tr>
  `;
}
function registrarPagoConvenio(){
  const fecha = document.getElementById('convPagoFecha')?.value || '';
  const concepto = document.getElementById('convPagoConcepto')?.value || '';
const monto = Number(String(document.getElementById('convPagoMonto')?.value || '').replace(/[$,\s]/g,'')) || 0;
  const comp = document.getElementById('convPagoComprobante')?.files?.[0]?.name || '';

  if(!fecha || !concepto || !monto){
    alert('Completa fecha, concepto y monto del pago. El comprobante es opcional.');
    return;
  }

  const historial = document.getElementById('convHistorial');
  if(historial){
    const firstEmpty = historial.querySelector('.pd-conv-empty');
    if(firstEmpty) historial.innerHTML = '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${fecha.split('-').reverse().join('/')}</td>
      <td>${concepto}</td>
      <td><strong>$${monto.toLocaleString('es-MX')}</strong></td>
      <td>${comp || 'Sin comprobante'}</td>
    `;
    historial.prepend(tr);
  }

  const pagado = document.getElementById('convMontoPagado');
  if(pagado){
    pagado.value = (Number(pagado.value || 0) + monto).toFixed(2);
  }

  const ultimo = document.getElementById('convUltimoPago');
  if(ultimo) ultimo.value = fecha.split('-').reverse().join('/') + ' · $' + monto.toLocaleString('es-MX');

  const totalPagos = document.getElementById('convTotalPagos');
  if(totalPagos) totalPagos.value = String(Number(totalPagos.value || 0) + 1);

  document.getElementById('convPagoFecha').value = '';
  document.getElementById('convPagoConcepto').value = '';
  document.getElementById('convPagoMonto').value = '';
  const file = document.getElementById('convPagoComprobante');
  if(file) file.value = '';
  jsonpAction({
  action: 'savePagoConvenio',
  cliente: curClient || '',
  torre: curData?.torre || '',
  depto: curData?.depto || '',
  fechaPago: fecha,
  concepto: concepto,
  monto: monto,
  comprobante: comp || 'Sin comprobante',
  estado: document.getElementById('convEstado')?.value || ''
},
function(res){
  console.log('Pago guardado en Sheets', res);
},
function(err){
  alert('No se pudo guardar en Sheets. Revisa consola.');
  console.error(err);
}
);
  actualizarEstadoConvenio();
}
